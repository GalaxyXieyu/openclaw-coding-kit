)" stroke="rgb(129, 140, 248)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(49, 46, 129)" font-family="&quot;PingFang SC&quot;, Arial" font-size="14px" text-anchor="middle"><text x="691" y="527">PM 上下文资产</text><text x="691" y="544">pm.json + current-context</text><text x="691" y="561">agent 绑定 / workspace</text><text x="691" y="578">handoff bundle</text></g></g><g data-cell-id="23"><g data-geometry="1" transform="translate(0.5,0.5)"><rect x="561" y="690" width="260" height="108" rx="16.2" ry="16.2" fill="rgb(238, 246, 255)" stroke="rgb(59, 130, 246)" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(30, 58, 138)" font-family="&quot;PingFang SC&quot;, Arial" font-size="14px" text-anchor="middle"><text x="691" y="741">PM 的职责不是写代码</text><text x="691" y="758">而是把模糊需求变成稳定执行输入</text></g></g></g><g data-cell-id="30"><g data-geometry="1" transform="translate(0.5,0.5)"><path d="M 1211 178 L 1211 166 Q 1211 136 1181 136 L 941 136 Q 911 136 911 166 L 911 178" fill="rgb(236, 254, 255)" stroke="rgb(6, 182, 212)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/><path d="M 911 178 L 911 826 Q 911 856 941 856 L 1181 856 Q 1211 856 1211 826 L 1211 178" stroke="rgb(6, 182, 212)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10" fill="none"/><path d="M 911 178 L 1211 178" stroke="rgb(6, 182, 212)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10" fill="none" pointer-events="none"/></g><g fill="rgb(22, 78, 99)" font-family="&quot;PingFang SC&quot;, Arial" font-size="16px" text-anchor="middle" font-weight="bold"><text x="1061" y="162.6">Codex 工程层</text></g><g data-cell-id="31"><g data-geometry="1" transform="translate(0.5,0.5)"><rect x="931" y="186" width="260" height="104" rx="15.6" ry="15.6" fill="rgb(255, 255, 255)" stroke="rgb(74, 222, 128)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(20, 83, 45)" font-family="&quot;PingFang SC&quot;, Arial" font-size="14px" text-anchor="middle"><text x="1061" y="218">coder skill</text><text x="1061" y="235">规范化执行入口</text><text x="1061" y="252">先读 PM 上下文</text><text x="1061" y="269">再决定实现路径</text></g></g><g data-cell-id="32"><g data-geometry="1" transform="translate(0.5,0.5)"><rect x="931" y="384" width="260" height="104" rx="15.6" ry="15.6" fill="rgb(255, 255, 255)" stroke="rgb(74, 222, 128)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(20, 83, 45)" font-family="&quot;PingFang SC&quot;, Arial" font-size="14px" text-anchor="middle"><text x="1061" y="416">ACPX / ACP Coding Session</text><text x="1061" y="433">隔离长时执行会话</text><text x="1061" y="450">避免主会话</text><text x="1061" y="467">上下文爆炸</text></g></g><g data-cell-id="33"><g data-geometry="1" transform="translate(0.5,0.5)"><rect x="931" y="582" width="260" height="118" rx="17.7" ry="17.7" fill="rgb(255, 255, 255)" stroke="rgb(74, 222, 128)" stroke-width="1" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(20, 83, 45)" font-family="&quot;PingFang SC&quot;, Arial" font-size="13px" text-anchor="middle"><text x="1061" y="622">本地 Codex Workspace</text><text x="1061" y="638">直接用本地 repo / IDE / test / env</text><text x="1061" y="654">代码实现、调试、验证都在这里完成</text><text x="1061" y="670">复杂问题可以贴着真实工程落地</text></g></g><g data-cell-id="34"><g data-geometry="1" transform="translate(0.5,0.5)"><rect x="931" y="730" width="260" height="124" rx="18.6" ry="18.6" fill="rgb(240, 253, 244)" stroke="rgb(22, 163, 74)" stroke-width="1" stroke-dasharray="3 3" stroke-linecap="flat" stroke-linejoin="miter" stroke-miterlimit="10"/></g><g fill="rgb(22, 101, 52)" font-family="&quot;PingFang SC&quot;, Arial" font-size="13px" text-anchor="middle"><text x="1061" y="773">Codex 的额外优势</text><text x="1061" y="